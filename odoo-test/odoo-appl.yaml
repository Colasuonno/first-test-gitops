apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: odoo-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Colasuonno/first-test-gitops.git
    targetRevision: HEAD
    path: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: odoo-test


  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true